name: Run Selenium Feeds

on:
  schedule:
    - cron: "30 7-22/5 * * *"
  workflow_dispatch:

concurrency:
  group: selenium-feeds
  cancel-in-progress: true

jobs:
  run-selenium-feeds:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.15"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install dependencies
        run: uv sync

      - name: Run Selenium feeds
        id: run_feeds
        timeout-minutes: 45
        continue-on-error: true
        run: uv run feed_generators/util/run_all_feeds.py

      - name: Commit and push feeds
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feeds/*.xml
          git stash
          git pull --rebase || { echo "Rebase failed, aborting and retrying with merge"; git rebase --abort 2>/dev/null; git pull; }
          git stash pop || true
          git add feeds/*.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            last_author=$(git log -1 --format='%ae')
            if [ "$last_author" = 'github-actions[bot]@users.noreply.github.com' ]; then
              git commit --amend -m 'Update RSS feeds'
              git push --force-with-lease || { git pull --rebase && git push --force-with-lease; }
            else
              git commit -m 'Update RSS feeds'
              git push || { git pull --rebase && git push; }
            fi
          fi

      - name: Fail job if any feed generator failed
        if: steps.run_feeds.outcome == 'failure'
        run: |
          echo "One or more feed generators failed; feeds that succeeded were still pushed above." >&2
          exit 1
